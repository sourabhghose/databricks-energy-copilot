# ============================================================
# Databricks Asset Bundle — AUS Energy Copilot
# Schema: DAB v2 (targets, not environments)
# Deploy dev:  databricks bundle deploy --target dev
# Deploy prod: databricks bundle deploy --target prod
# ============================================================

bundle:
  name: energy-copilot

variables:
  catalog:
    description: "Unity Catalog name for the target environment"
    default: energy_copilot_catalog
  lakebase_instance_name:
    description: "Lakebase database instance name"
    default: energy-copilot-db
  lakebase_database:
    description: "Lakebase Postgres database name"
    default: energy_copilot_db
  warehouse_id:
    description: "SQL Warehouse ID"
    lookup:
      warehouse: "Serverless Starter Warehouse"
  notification_email:
    description: "Email for job failure notifications (leave empty to disable)"
    default: ""
  app_name:
    description: "Databricks App name"
    default: energy-copilot
  vs_endpoint_name:
    description: "Vector Search endpoint name"
    default: energy-copilot-vs-endpoint

include:
  - resources/*.yml

# ---------------------------------------------------------------------------
# Targets
# ---------------------------------------------------------------------------
targets:
  dev:
    mode: development
    default: true
    workspace:
      host: https://fevm-energy-copilot.cloud.databricks.com

  prod:
    mode: production
    workspace:
      host: https://fevm-energy-copilot.cloud.databricks.com
    variables:
      catalog: energy_copilot
