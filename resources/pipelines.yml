# ============================================================
# DLT Pipelines — Serverless (no cluster spec needed)
# ============================================================

resources:
  pipelines:

    dlt_nemweb_ingest:
      name: "[${bundle.target}] DLT — NEMWEB Ingest (01)"
      catalog: ${var.catalog}
      target: gold
      serverless: true
      libraries:
        - notebook:
            path: ../pipelines/01_nemweb_ingest.py
      configuration:
        catalog: ${var.catalog}
      development: true
      continuous: false
      channel: PREVIEW

    dlt_openelec_ingest:
      name: "[${bundle.target}] DLT — OpenElectricity Ingest (02)"
      catalog: ${var.catalog}
      target: gold
      serverless: true
