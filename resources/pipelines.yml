      configuration:
        catalog: ${var.catalog}
      development: ${bundle.target == "dev"}
      continuous: false
      photon: true
      channel: PREVIEW

    dlt_solar_ingest:
      name: "[${bundle.target}] DLT — Solar Ingest (04)"
      description: "Delta Live Tables pipeline for APVI rooftop solar data."
      catalog: ${var.catalog}
      target: gold
