# ============================================================
# Jobs — All serverless (environment_key, no new_cluster)
# ============================================================

resources:
  jobs:

    # -----------------------------------------------------------------
    # Job 00 — One-Time Setup (schemas, tables, backfill)
    # -----------------------------------------------------------------
    job_00_setup:
      name: "[${bundle.target}] 00 — Initial Setup"
      description: "One-time setup: create schemas, tables, SP grants, seed external data, run backfill."
      tags:
        environment: ${bundle.target}
        pipeline: "00_setup"
      tasks:
        - task_key: create_schemas
          notebook_task:
            notebook_path: ../setup/01_create_schemas.sql
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_core_nem_tables
          depends_on:
            - task_key: create_schemas
          notebook_task:
            notebook_path: ../setup/23_create_core_nem_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_tables
          depends_on:
            - task_key: create_core_nem_tables
          notebook_task:
            notebook_path: ../setup/02_create_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        # Seed external data (run in parallel after tables exist)
        - task_key: seed_isp_data
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../pipelines/12_isp_data_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: seed_lgc_data
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../pipelines/11_cer_lgc_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: seed_tariff_data
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../pipelines/09_aer_tariff_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: seed_facility_data
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../pipelines/10_opennem_facility_timeseries.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: seed_deal_data
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/13_seed_deal_data.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_competitive_gap_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/14_create_competitive_gap_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_approval_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/15_create_approval_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_constraint_forecast_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/16_create_constraint_forecast_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_polish_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/17_create_polish_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_phase3_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/18_create_phase3_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: seed_phase3_data
          depends_on:
            - task_key: create_phase3_tables
          notebook_task:
            notebook_path: ../setup/19_seed_phase3_data.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_facility_locations
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/20_create_facility_locations.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_trading_signals_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/21_create_trading_signals_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_network_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/22_create_network_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_settlement_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/24_create_settlement_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: backfill
          depends_on:
            - task_key: create_core_nem_tables
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/11_historical_backfill.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 1

    # -----------------------------------------------------------------
    # Job 01 — NEMWEB Ingest (every 5 min)
    # -----------------------------------------------------------------
    job_01_nemweb_ingest:
      name: "[${bundle.target}] 01 — NEMWEB Ingest"
      description: "Bronze→Silver→Gold DLT pipeline for NEMWEB dispatch data. 5-minute cadence."
      tags:
        environment: ${bundle.target}
        pipeline: "01_nemweb_ingest"
      schedule:
        quartz_cron_expression: "0 */5 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      tasks:
        - task_key: nemweb_ingest
          notebook_task:
            notebook_path: ../pipelines/01_nemweb_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 1
      # email_notifications configured when notification_email variable is set

    # -----------------------------------------------------------------
    # Job 02 — OpenElectricity Ingest (every 30 min)
    # -----------------------------------------------------------------
    job_02_openelec_ingest:
      name: "[${bundle.target}] 02 — OpenElectricity Ingest"
      description: "Incremental ingest from OpenElectricity API (renewable generation, capacity factors)."
      tags:
        environment: ${bundle.target}
        pipeline: "02_openelec_ingest"
      schedule:
        quartz_cron_expression: "0 */30 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      tasks:
        - task_key: openelec_ingest
          notebook_task:
            notebook_path: ../pipelines/02_openelec_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 1
      # email_notifications configured when notification_email variable is set

    # -----------------------------------------------------------------
    # Job 03 — Weather Ingest (every hour at :10)
    # -----------------------------------------------------------------
    job_03_weather_ingest:
      name: "[${bundle.target}] 03 — Weather Ingest"
      description: "Open-Meteo BOM ACCESS-G NWP ingest (+1h/+4h/+24h forecast horizons)."
      tags:
        environment: ${bundle.target}
        pipeline: "03_weather_ingest"
      schedule:
        quartz_cron_expression: "0 10 */1 * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      tasks:
        - task_key: weather_ingest
          notebook_task:
            notebook_path: ../pipelines/03_weather_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 1
      # email_notifications configured when notification_email variable is set

    # -----------------------------------------------------------------
    # Job 04 — Solar Ingest (every hour at :20)
    # -----------------------------------------------------------------
    job_04_solar_ingest:
      name: "[${bundle.target}] 04 — Solar Ingest"
      description: "APVI rooftop solar ingest (ACT→NSW1 region mapping)."
      tags:
        environment: ${bundle.target}
        pipeline: "04_solar_ingest"
      schedule:
        quartz_cron_expression: "0 20 */1 * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      tasks:
        - task_key: solar_ingest
          notebook_task:
            notebook_path: ../pipelines/04_solar_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 1
      # email_notifications configured when notification_email variable is set

    # -----------------------------------------------------------------
    # Job 05 — Forecast Pipeline (every 5 min at :02)
    # -----------------------------------------------------------------
    job_05_forecast_pipeline:
      name: "[${bundle.target}] 05 — Forecast Pipeline"
      description: "ML inference: LightGBM price/demand/wind/solar + IsolationForest anomaly detection."
      tags:
        environment: ${bundle.target}
        pipeline: "05_forecast_pipeline"
      schedule:
        quartz_cron_expression: "0 2 */5 * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      tasks:
        - task_key: forecast_pipeline
          notebook_task:
            notebook_path: ../pipelines/05_forecast_pipeline.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - lightgbm>=4.0.0
              - scikit-learn>=1.4.0
              - mlflow>=2.13.0
      max_concurrent_runs: 1
      # email_notifications configured when notification_email variable is set

    # -----------------------------------------------------------------
    # Job 06 — Daily Market Summary (05:30 AEST = 19:30 UTC)
    # -----------------------------------------------------------------
    job_06_market_summary:
      name: "[${bundle.target}] 06 — Daily Market Summary"
      description: "Claude Sonnet AI-generated daily NEM market narrative. Runs at 05:30 AEST."
      tags:
        environment: ${bundle.target}
        pipeline: "06_market_summary"
      schedule:
        quartz_cron_expression: "0 30 19 * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      tasks:
        - task_key: market_summary
          notebook_task:
            notebook_path: ../pipelines/06_market_summary.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - anthropic>=0.44.0
      max_concurrent_runs: 1
      # email_notifications configured when notification_email variable is set

    # -----------------------------------------------------------------
    # Job 08 — Data Quality Report (daily 06:00 AEST = 20:00 UTC)
    # -----------------------------------------------------------------
    job_08_data_quality_report:
      name: "[${bundle.target}] 08 — Data Quality Report"
      description: "Daily data quality report: DLT expectations, Gold table freshness, row counts, null rates."
      tags:
        environment: ${bundle.target}
        pipeline: "08_data_quality_report"
      schedule:
        quartz_cron_expression: "0 0 20 * * ?"
        timezone_id: UTC
        pause_status: UNPAUSED
      tasks:
        - task_key: data_quality_report
          notebook_task:
            notebook_path: ../pipelines/08_data_quality_report.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 1
      # email_notifications configured when notification_email variable is set

    # -----------------------------------------------------------------
    # Job 09 — AER Retail Tariff Ingest (daily)
    # -----------------------------------------------------------------
    job_09_aer_tariffs:
      name: "[${bundle.target}] 09 — AER Tariff Ingest"
      description: "Fetch retail energy plans from AER CDR API. Daily cadence."
      tags:
        environment: ${bundle.target}
        pipeline: "09_aer_tariffs"
      schedule:
        quartz_cron_expression: "0 0 6 * * ?"
        timezone_id: "Australia/Brisbane"
        pause_status: UNPAUSED
      tasks:
        - task_key: aer_tariff_ingest
          notebook_task:
            notebook_path: ../pipelines/09_aer_tariff_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 1
      # email_notifications configured when notification_email variable is set

    # -----------------------------------------------------------------
    # Job 10a — OpenNEM Facility Timeseries (every 30 min)
    # -----------------------------------------------------------------
    job_10_opennem_facilities:
      name: "[${bundle.target}] 10a — OpenNEM Facility Timeseries"
      description: "Fetch facility-level power timeseries from OpenElectricity API."
      tags:
        environment: ${bundle.target}
        pipeline: "10_opennem"
      schedule:
        quartz_cron_expression: "0 15 */1 * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      tasks:
        - task_key: opennem_facility_ingest
          notebook_task:
            notebook_path: ../pipelines/10_opennem_facility_timeseries.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 1
      # email_notifications configured when notification_email variable is set

    # -----------------------------------------------------------------
    # Job 11 — CER LGC Ingest (quarterly / manual)
    # -----------------------------------------------------------------
    job_11_cer_lgc:
      name: "[${bundle.target}] 11 — CER LGC Ingest"
      description: "Download CER LGC registry and spot price data. Quarterly."
      tags:
        environment: ${bundle.target}
        pipeline: "11_cer_lgc"
      tasks:
        - task_key: cer_lgc_ingest
          notebook_task:
            notebook_path: ../pipelines/11_cer_lgc_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 1

    # -----------------------------------------------------------------
    # Job 12 — AEMO ISP Data Ingest (annual / manual)
    # -----------------------------------------------------------------
    job_12_isp_data:
      name: "[${bundle.target}] 12 — AEMO ISP Data Ingest"
      description: "Parse AEMO ISP 2024 project tracker, capacity outlook, and REZ assessments."
      tags:
        environment: ${bundle.target}
        pipeline: "12_isp_data"
      tasks:
        - task_key: isp_data_ingest
          notebook_task:
            notebook_path: ../pipelines/12_isp_data_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 1

    # -----------------------------------------------------------------
    # Job 09x — NEM Simulator (manual start, continuous)
    # -----------------------------------------------------------------
    job_09_simulator:
      name: "[${bundle.target}] 09 — NEM Simulator"
      description: "Writes simulated NEM market data every 30s. Start manually, runs continuously."
      tags:
        environment: ${bundle.target}
        pipeline: "09_simulator"
      tasks:
        - task_key: nem_simulator
          notebook_task:
            notebook_path: ../setup/10_nem_simulator.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 1
      timeout_seconds: 0

    # -----------------------------------------------------------------
    # Job 10 — Dashboard Snapshot Generator (every 5 min)
    # -----------------------------------------------------------------
    job_10_dashboard_snapshots:
      name: "[${bundle.target}] 10 — Dashboard Snapshots"
      description: "Pre-computes JSON payloads for dashboard endpoints. Enables sub-10ms Lakebase reads."
      tags:
        environment: ${bundle.target}
        pipeline: "10_snapshots"
      schedule:
        quartz_cron_expression: "0 */5 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      tasks:
        - task_key: snapshot_generator
          notebook_task:
            notebook_path: ../pipelines/09_dashboard_snapshot_generator.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 1
