# ============================================================
# Jobs — All serverless (environment_key, no new_cluster)
# ============================================================

resources:
  jobs:

    # -----------------------------------------------------------------
    # Job 00 — One-Time Setup (schemas, tables, backfill)
    # -----------------------------------------------------------------
    job_00_setup:
      name: "[${bundle.target}] 00 — Initial Setup"
      description: "One-time setup: create schemas, tables, SP grants, seed external data, run backfill."
      tags:
        environment: ${bundle.target}
        pipeline: "00_setup"
      tasks:
        - task_key: create_catalog
          notebook_task:
            notebook_path: ../setup/00_create_catalog.sql
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_schemas
          depends_on:
            - task_key: create_catalog
          notebook_task:
            notebook_path: ../setup/01_create_schemas.sql
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: setup_lakebase
          depends_on:
            - task_key: create_schemas
          notebook_task:
            notebook_path: ../setup/03_setup_lakebase.sql
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_legacy_tables
          depends_on:
            - task_key: create_schemas
          notebook_task:
            notebook_path: ../setup/02_create_tables_legacy.sql
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_core_nem_tables
          depends_on:
            - task_key: create_schemas
          notebook_task:
            notebook_path: ../setup/23_create_core_nem_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_tables
          depends_on:
            - task_key: create_core_nem_tables
          notebook_task:
            notebook_path: ../setup/02_create_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        # Seed external data (run in parallel after tables exist)
        - task_key: seed_isp_data
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../pipelines/12_isp_data_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: seed_lgc_data
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../pipelines/11_cer_lgc_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: seed_tariff_data
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../pipelines/09_aer_tariff_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: seed_facility_data
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../pipelines/10_opennem_facility_timeseries.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: seed_deal_data
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/13_seed_deal_data.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_competitive_gap_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/14_create_competitive_gap_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_approval_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/15_create_approval_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_constraint_forecast_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/16_create_constraint_forecast_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_polish_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/17_create_polish_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_phase3_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/18_create_phase3_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: seed_phase3_data
          depends_on:
            - task_key: create_phase3_tables
          notebook_task:
            notebook_path: ../setup/19_seed_phase3_data.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_facility_locations
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/20_create_facility_locations.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_trading_signals_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/21_create_trading_signals_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_network_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/22_create_network_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_settlement_tables
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/24_create_settlement_tables.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_wem_fetch_state
          depends_on:
            - task_key: create_schemas
          notebook_task:
            notebook_path: ../setup/25_create_wem_fetch_state.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: seed_sttm_gas
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../pipelines/13_sttm_gas_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: seed_dnsp_outages
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../pipelines/15_dnsp_outage_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: seed_aer_reliability
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../pipelines/16_aer_reliability_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: create_alerts
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/05_create_alerts.sql
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: grant_lakebase_perms
          depends_on:
            - task_key: setup_lakebase
            - task_key: create_tables
          notebook_task:
            notebook_path: ../pipelines/11_grant_lakebase_perms.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: lakebase
        - task_key: create_genie_spaces
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/04_create_genie_spaces.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: register_uc_functions
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/06_register_uc_functions.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: setup_monitoring
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/07_setup_monitoring.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: load_generator_registry
          depends_on:
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/load_generator_registry.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
        - task_key: backfill
          depends_on:
            - task_key: create_core_nem_tables
            - task_key: create_tables
          notebook_task:
            notebook_path: ../setup/11_historical_backfill.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
        - environment_key: lakebase
          spec:
            client: "1"
            dependencies:
              - psycopg[binary]>=3.0
              - databricks-sdk>=0.81.0
      max_concurrent_runs: 1

    # -----------------------------------------------------------------
    # Job 01 — NEMWEB Ingest (every 5 min)
    # -----------------------------------------------------------------
    job_01_nemweb_ingest:
      name: "[${bundle.target}] 01 — NEMWEB Ingest"
      description: "Bronze→Silver→Gold DLT pipeline for NEMWEB dispatch data. 5-minute cadence."
      tags:
        environment: ${bundle.target}
        pipeline: "01_nemweb_ingest"
      schedule:
        quartz_cron_expression: "0 */5 * * * ?"
        timezone_id: "UTC"
        pause_status: UNPAUSED
      tasks:
        - task_key: nemweb_ingest
          notebook_task:
            notebook_path: ../pipelines/01_nemweb_ingest.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
      max_concurrent_runs: 1
      # email_notifications configured when notification_email variable is set

    # -----------------------------------------------------------------
    # Job 02 — OpenElectricity Ingest (every 30 min)
    # -----------------------------------------------------------------
    job_02_openelec_ingest:
      name: "[${bundle.target}] 02 — OpenElectricity Ingest"
      description: "Incremental ingest from OpenElectricity API (renewable generation, capacity factors)."
