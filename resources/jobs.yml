    # -----------------------------------------------------------------
    job_04_solar_ingest:
      name: "[${bundle.target}] 04 — Solar Ingest"
      description: "APVI rooftop solar ingest (ACT→NSW1 region mapping)."
      tags:
        environment: ${bundle.target}
        pipeline: "04_solar_ingest"
      schedule:
