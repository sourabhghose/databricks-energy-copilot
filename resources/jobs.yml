        timezone_id: "UTC"
        pause_status: UNPAUSED
      tasks:
        - task_key: forecast_pipeline
          notebook_task:
            notebook_path: ../pipelines/05_forecast_pipeline.py
            base_parameters:
              catalog: ${var.catalog}
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - lightgbm>=4.0.0
              - scikit-learn>=1.4.0
              - mlflow>=2.13.0
      max_concurrent_runs: 1
      # email_notifications configured when notification_email variable is set

    # -----------------------------------------------------------------
